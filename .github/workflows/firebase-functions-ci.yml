name: Firebase Functions CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "LiveGeoGuessr/functions/**"
      - "LiveGeoGuessr/firebase.json"
      - "LiveGeoGuessr/firestore.rules"
      - "LiveGeoGuessr/storage.rules"
      - ".github/workflows/firebase-functions-ci.yml"

  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "LiveGeoGuessr/functions/**"
      - "LiveGeoGuessr/firebase.json"
      - "LiveGeoGuessr/firestore.rules"
      - "LiveGeoGuessr/storage.rules"
      - ".github/workflows/firebase-functions-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-functions-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions-tests:
    name: Build and test Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: LiveGeoGuessr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: LiveGeoGuessr/functions/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build Functions
        run: npm run build --prefix functions

      - name: Run unit tests with coverage
        run: npm run test:coverage --prefix functions

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-functions-coverage
          path: LiveGeoGuessr/functions/coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.20.0

      - name: Run integration tests with Firebase emulators
        run: >
          firebase emulators:exec
          --project demo-live-geoguessr
          --only auth,firestore,functions,storage
          "npm --prefix functions run test:integration"