name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LiveGeoGuessr

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create google-services.json
      run: |
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

    - name: Restore CI keystore
      env:
        CI_KEYSTORE_BASE64: ${{ secrets.CI_KEYSTORE_BASE64 }}
      run: |
        echo "$CI_KEYSTORE_BASE64" | base64 --decode > app/github-actions.jks

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run unit tests
      run: ./gradlew :app:testDebugUnitTest --no-daemon

    - name: Generate logic coverage report
      run: ./gradlew :app:logicCoverageReport --no-daemon

    - name: Build APK
      env:
        CI_KEYSTORE_PATH: ${{ github.workspace }}/LiveGeoGuessr/app/github-actions.jks
        CI_KEYSTORE_PASSWORD: ${{ secrets.CI_KEYSTORE_PASSWORD }}
        CI_KEY_ALIAS: ${{ secrets.CI_KEY_ALIAS }}
        CI_KEY_PASSWORD: ${{ secrets.CI_KEY_PASSWORD }}
      run: ./gradlew assembleDebug signingReport --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: LiveGeoGuessr/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload logic coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logic-coverage-report
        path: LiveGeoGuessr/app/build/reports/coverage/logic/
        if-no-files-found: warn